<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(245,166,35,0.06)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Logo icon -->
  <rect x="80" y="80" width="64" height="64" rx="14" fill="#f5a623"/>
  <text x="112" y="124" text-anchor="middle" font-family="monospace" font-size="36" fill="#000">⚡</text>
  <!-- Logo text -->
  <text x="164" y="112" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="#e8e8e8">Nostr<tspan fill="#f5a623">Market</tspan></text>
  <!-- Tag -->
  <rect x="80" y="200" width="320" height="32" rx="16" fill="rgba(245,166,35,0.12)" stroke="rgba(245,166,35,0.35)" stroke-width="1"/>
  <text x="240" y="221" text-anchor="middle" font-family="monospace" font-size="12" fill="#f5a623" letter-spacing="2">COMMUNITY DIRECTORY</text>
  <!-- Main headline -->
  <text x="80" y="310" font-family="Arial Black, sans-serif" font-size="62" font-weight="900" fill="#e8e8e8">The Nostr</text>
  <text x="80" y="385" font-family="Arial Black, sans-serif" font-size="62" font-weight="900" fill="#f5a623">Marketplace</text>
  <text x="80" y="460" font-family="Arial Black, sans-serif" font-size="62" font-weight="900" fill="#e8e8e8">Directory</text>
  <!-- Subtitle -->
  <text x="80" y="530" font-family="Arial, sans-serif" font-size="22" fill="#666">Projects · Creators · Communities · Bitcoin Lightning</text>
  <!-- URL -->
  <text x="1120" y="590" text-anchor="end" font-family="monospace" font-size="18" fill="#f5a623">nostrmarket.org</text>
</svg>
